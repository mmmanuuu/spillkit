name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve bump from PR labels
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          bump=""
          IFS=',' read -ra parts <<< "$LABELS"
          for label in "${parts[@]}"; do
            case "$label" in
              major) bump=major ;;
              minor) if [[ "$bump" != major ]]; then bump=minor; fi ;;
              patch) if [[ -z "$bump" ]]; then bump=patch; fi ;;
            esac
          done

          if [[ -z "$bump" ]]; then
            echo "No patch/minor/major label — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "Bump type: $bump"

      - name: Bump version, commit, and tag
        if: steps.bump.outputs.skip != 'true'
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          set -euo pipefail

          latest="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ -z "$latest" ]]; then
            current="0.0.0"
          else
            current="${latest#v}"
          fi

          IFS='.' read -r major minor patch <<< "$current"
          major="${major:-0}"
          minor="${minor:-0}"
          patch="${patch:-0}"

          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "Unknown bump: $BUMP"; exit 1 ;;
          esac

          version="${major}.${minor}.${patch}"
          tag="v${version}"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists — aborting."
            exit 1
          fi

          # Keep package.json in sync (no npm required).
          VERSION="$version" node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          if git diff --staged --quiet; then
            echo "package.json already at ${version} — tagging without version commit."
          else
            git commit -m "chore: release ${tag}"
            git push origin HEAD:main
          fi
          git tag -a "$tag" -m "$tag"
          git push origin "$tag"

          echo "Released $tag"
